name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ تحديث checkout إلى v4
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ تحديث setup-java إلى v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ✅ Flutter (إصدار أحدث لتجنب مشاكل مستقبلية)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # ✅ تثبيت dependencies
      - name: Install dependencies
        run: flutter pub get

      # (اختياري لكن مهم) تحليل الكود
      - name: Analyze project
        run: flutter analyze

      # ✅ بناء APK
      - name: Build APK
        run: flutter build apk --release

      # ✅ رفع الملف (تحديث إلى v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
